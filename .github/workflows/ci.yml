name: QUIC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sindarin-pkg-test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Sindarin
        uses: SindarinSDK/sindarin-pipelines/.github/actions/install-sindarin@main

      - name: Check formatting
        shell: bash
        run: sn --format --check

      # TEMPORARY: diagnose macOS-only SIGABRT in test_quic_resilience_errors.
      # Enables unlimited core dumps and a world-writable /cores so the kernel
      # can drop crash files. Remove once the macOS failure is fixed.
      - name: Enable macOS crash capture
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ulimit -c unlimited || true
          sudo sysctl -w kern.corefile=/cores/core.%P || true
          sudo mkdir -p /cores
          sudo chmod 1777 /cores
          # Show pre-test state of DiagnosticReports so we can tell what's new.
          ls -la ~/Library/Logs/DiagnosticReports/ 2>/dev/null || true
          ls -la /Library/Logs/DiagnosticReports/ 2>/dev/null || true

      - name: Run tests
        shell: bash
        env:
          # macOS-only; harmless on other OSes.
          MallocStackLogging: 1
        run: make test

      # TEMPORARY: surface the backtrace for the macOS-only abort so we can
      # identify which assert/abort fires. Remove once fixed.
      - name: Collect macOS crash reports
        if: failure() && runner.os == 'macOS'
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/crash-reports
          echo "===== user DiagnosticReports ====="
          ls -la ~/Library/Logs/DiagnosticReports/ 2>/dev/null
          cp -a ~/Library/Logs/DiagnosticReports/. /tmp/crash-reports/ 2>/dev/null
          echo "===== system DiagnosticReports ====="
          ls -la /Library/Logs/DiagnosticReports/ 2>/dev/null
          sudo cp -a /Library/Logs/DiagnosticReports/. /tmp/crash-reports/ 2>/dev/null
          sudo chown -R "$(whoami)" /tmp/crash-reports 2>/dev/null
          echo
          echo "===== crash report contents ====="
          for f in /tmp/crash-reports/*.ips /tmp/crash-reports/*.crash; do
            [ -f "$f" ] || continue
            echo "----- $f -----"
            cat "$f"
            echo
          done
          echo "===== /cores ====="
          ls -la /cores/ 2>/dev/null
          CORE=$(ls -1t /cores/core.* 2>/dev/null | head -1)
          BIN=$(find . -type f -name run_tests | head -1)
          if [ -n "$CORE" ] && [ -n "$BIN" ]; then
            echo "----- lldb backtrace ($BIN, $CORE) -----"
            lldb --batch -c "$CORE" "$BIN" \
              -o "thread backtrace all" \
              -o "quit" || true
          fi

      - name: Upload macOS crash reports
        if: failure() && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-crash-reports
          path: |
            /tmp/crash-reports/
            /cores/
          if-no-files-found: ignore
